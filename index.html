<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WRS Containers — Compact Redesign (Interactive Mockup)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --hh:64px;
  --steel:#1c2128;--line:#dde2e9;--line2:#eef1f5;--board:#eef1f4;--card:#fff;--ink:#1c2128;--muted:#6b7280;--amber:#f5a623;
  --st-pick-b:#fef3c7;--st-pick-t:#b45309;--st-new-b:#dbeafe;--st-new-t:#1d4ed8;--st-prog-b:#ede9fe;--st-prog-t:#6d28d9;
  --st-comp-b:#dcfce7;--st-comp-t:#15803d;--st-ready-b:#cffafe;--st-ready-t:#0e7490;
  --lt-front-b:#e0f2fe;--lt-front-t:#0369a1;--lt-rear-b:#ffedd5;--lt-rear-t:#9a3412;
}
*{box-sizing:border-box}
body{margin:0;font-family:'Barlow',system-ui,sans-serif;color:var(--ink);background:var(--board);font-size:14px}
header{background:linear-gradient(108deg,#171c23,#212b39 60%,#2b2533);color:#fff;padding:11px 16px;display:flex;align-items:center;gap:12px;border-bottom:3px solid var(--amber);position:sticky;top:0;z-index:30}
.mark{width:38px;height:38px;border-radius:7px;background:#fff;display:grid;place-items:center;font-family:'Oswald';font-weight:700;color:#000;font-size:13px;letter-spacing:.5px}
.htitle h1{font-family:'Oswald';font-weight:600;font-size:19px;margin:0;letter-spacing:.5px;text-transform:uppercase}
.htitle small{font-size:9.5px;letter-spacing:1.6px;color:#9aa4b1;text-transform:uppercase}
.sp{flex:1}
.hbtn{font-family:'Oswald';text-transform:uppercase;letter-spacing:.5px;font-weight:600;font-size:13px;border:0;cursor:pointer;padding:9px 14px;border-radius:7px;background:var(--amber);color:#1c2128}
.hbtn.g{background:transparent;color:#cfd6df;border:1px solid #3a434e}
.tag{display:inline-block;background:#fde68a;color:#92400e;font-family:'Oswald';font-weight:600;font-size:10px;letter-spacing:.5px;text-transform:uppercase;padding:3px 8px;border-radius:5px;margin-left:8px}
.toolbar{display:flex;align-items:center;gap:10px;padding:11px 16px}
.search{display:flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px 12px;width:340px;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.search input{border:0;outline:0;font:inherit;width:100%;background:transparent}
.filter{display:flex;background:#fff;border:1px solid var(--line);border-radius:9px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.filter button{border:0;background:transparent;font-family:'Oswald';font-weight:500;font-size:12px;letter-spacing:.3px;text-transform:uppercase;padding:9px 12px;cursor:pointer;color:var(--muted);border-right:1px solid var(--line2);white-space:nowrap}
.filter button.active{background:linear-gradient(180deg,#2563eb,#1d4ed8);color:#fff}
.filter button.dv.active{background:linear-gradient(180deg,#16a34a,#15803d)}
.filter button:last-child{border-right:0}
.count{margin-left:auto;font-family:'Oswald';font-size:13px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
.count b{color:#15803d}
.wrap{padding:0 16px 50px}
.card{background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 1px 3px rgba(16,22,30,.07)}
.scroll{overflow:visible}
table{border-collapse:collapse;width:100%;min-width:1220px}
thead th{position:sticky;top:var(--hh,64px);z-index:20;background:linear-gradient(180deg,#2d3744,#222a34);color:#e2e8f0;font-family:'Oswald';font-weight:500;font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;text-align:center;padding:9px 9px;white-space:nowrap;border-bottom:2px solid var(--amber)}
thead th small{display:block;font-size:8.5px;color:#9aa9bb;letter-spacing:.3px;font-weight:400}
.gdiv{border-left:2px solid #3a4655}
tbody td.gdiv{border-left:2px solid #e6eaf0}
tbody td{padding:7px 9px;border-bottom:1px solid var(--line2);text-align:center;vertical-align:middle;font-size:13.5px}
tbody tr.r.zebra{background:#f8fafc}
tbody tr.r:hover{background:#eff5ff}
tbody tr.r:hover td.c-tkt{box-shadow:inset 3px 0 0 var(--amber)}
tbody tr.prio td.c-tkt{box-shadow:inset 3px 0 0 #dc2626}
tbody tr.prio{background:#fff5f5}
.tktwrap{display:flex;align-items:center;gap:8px;justify-content:flex-start}
.grip{color:#c2cad6;cursor:grab;font-size:14px;user-select:none}
.tkt{display:inline-flex;align-items:center;gap:7px;cursor:pointer;background:#eef2f8;border:1px solid var(--line);border-radius:8px;padding:4px 8px 4px 10px;color:#b91c1c;font-family:'Oswald';font-weight:700;font-size:15px;letter-spacing:.5px;line-height:1}
.tkt.open{background:#fff6e3;border-color:var(--amber)}
.tkt .cv{display:grid;place-items:center;width:18px;height:18px;border-radius:6px;background:var(--amber);color:#1c2128}
.tkt .cv svg{transition:transform .15s}
.tkt:not(.open) .cv svg{transform:rotate(-90deg)}
.loc{text-align:left;line-height:1.2}
.loc .nm{font-weight:600;font-size:13.5px}
.pill{display:inline-flex;align-items:center;gap:5px;font-family:'Oswald';font-weight:600;letter-spacing:.3px;text-transform:uppercase;font-size:11px;padding:5px 11px;border-radius:999px;cursor:pointer;white-space:nowrap}
.pill .c{font-size:7px;opacity:.6}
.p-new{background:var(--st-new-b);color:var(--st-new-t)}.p-prog{background:var(--st-prog-b);color:var(--st-prog-t)}
.p-pick{background:var(--st-pick-b);color:var(--st-pick-t)}.p-comp{background:var(--st-comp-b);color:var(--st-comp-t)}.p-ready{background:var(--st-ready-b);color:var(--st-ready-t)}
.p-front{background:var(--lt-front-b);color:var(--lt-front-t)}.p-rear{background:var(--lt-rear-b);color:var(--lt-rear-t)}
/* schedule — aligned label+input grid */
.sch-cell{min-width:158px}
.sched{display:inline-grid;grid-template-columns:14px auto;align-items:center;gap:5px 8px;justify-items:start}
.sched .k{color:var(--muted);font-weight:700;font-size:11px;font-family:'Oswald';justify-self:center}
.sched input{border:1px solid var(--line);border-radius:6px;padding:4px 6px;font:inherit;font-size:12px;width:128px;background:#fbfcfd}
.sched input.over{color:#dc2626;border-color:#fca5a5;background:#fff5f5}
.cell{font-family:'Barlow';font-size:13px;font-weight:500;padding:6px 8px;border:1px solid var(--line);border-radius:7px;background:#fbfcfd;color:var(--ink);cursor:pointer;max-width:138px}
.cell:focus{outline:2px solid var(--amber);border-color:var(--amber)}
.cell.wide{max-width:172px}
.cell.cnew{color:var(--st-comp-t);font-weight:600}.cell.creb{color:var(--st-prog-t);font-weight:600}
.qty{width:52px;height:34px;border:1px solid var(--line);border-radius:7px;text-align:center;font-weight:700;font-family:'Oswald';font-size:16px;background:#fbfcfd}
.notes{max-width:215px}
.notes textarea{width:100%;min-height:34px;resize:vertical;border:1px solid var(--line);border-radius:7px;padding:6px 8px;font:inherit;font-size:12.5px;background:#fbfcfd;text-align:left}
.ib{border:1px solid var(--line);background:#fff;border-radius:7px;width:34px;height:32px;display:inline-grid;place-items:center;cursor:pointer;color:var(--muted)}
.ib.qr{width:40px;height:34px;color:#6d28d9;border-color:#ddd6fe;background:#f5f3ff}
.ib.flag{color:#b45309;border-color:#fde68a;background:#fffbeb}.ib.flag.on{color:#fff;background:#dc2626;border-color:#dc2626}
.ib.edit{color:#1d4ed8;border-color:#bfdbfe;background:#eff6ff}
.ib.mail{color:#0e7490;border-color:#a5f3fc;background:#ecfeff}
.ib.del{color:#dc2626;border-color:#fecaca;background:#fef2f2}
.acts{display:flex;gap:6px;justify-content:center}
.pop{position:fixed;z-index:80;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 10px 30px rgba(16,22,30,.18);padding:6px;min-width:160px}
.pop button{display:flex;align-items:center;gap:9px;width:100%;border:0;background:transparent;font:inherit;font-size:14px;font-weight:500;padding:8px 10px;border-radius:7px;cursor:pointer;text-align:left}
.pop button:hover{background:var(--line2)}.pop .dot{width:11px;height:11px;border-radius:50%}
.detail td{background:#eef2f8;text-align:left;padding:0;box-shadow:inset 0 4px 7px -5px rgba(0,0,0,.2)}
.detail-in{padding:11px 16px}
.dhead{font-family:'Oswald';font-weight:600;font-size:12px;letter-spacing:.5px;text-transform:uppercase;color:var(--steel);margin-bottom:9px}
.cprog{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.cn{font-family:'Oswald';font-weight:700;width:28px;text-align:center;font-size:13.5px}
.stages{display:flex;flex:1;gap:4px}
.st{flex:1;border:1px solid var(--line);background:#fff;border-radius:6px;padding:8px 4px;font-family:'Oswald';font-weight:600;font-size:10px;letter-spacing:.2px;text-transform:uppercase;color:#97a0ad;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.st:hover{border-color:#16a34a;color:#16a34a}
.st.done{background:linear-gradient(180deg,#22c55e,#15803d);color:#fff;border-color:#15803d}
.pct{font-family:'Oswald';font-weight:700;color:#15803d;width:46px;text-align:right;font-size:13.5px}
.legend{padding:13px 16px;color:var(--muted);font-size:13px;display:flex;gap:18px;flex-wrap:wrap}
.legend b{color:var(--ink)}
/* QR modal */
.overlay{position:fixed;inset:0;background:rgba(16,22,30,.55);backdrop-filter:blur(3px);z-index:90;display:none;align-items:flex-start;justify-content:center;padding:36px 14px;overflow:auto}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;width:100%;max-width:560px;box-shadow:0 22px 60px rgba(0,0,0,.4);overflow:hidden}
.modal h2{font-family:'Oswald';text-transform:uppercase;letter-spacing:.5px;background:var(--steel);color:#fff;margin:0;padding:15px 18px;font-size:18px;border-bottom:3px solid var(--amber);display:flex;justify-content:space-between;align-items:center}
.modal h2 .x{cursor:pointer;color:#9aa4b1;font-size:23px}.modal h2 .x:hover{color:#fff}
.qrbox{padding:20px;text-align:center}
.qt{font-family:'Oswald';font-weight:700;font-size:21px;letter-spacing:.5px}.qsub{color:var(--muted);font-size:13px;margin-top:2px}
.qrgrid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:16px;max-height:56vh;overflow:auto}
.qrcell{border:1px solid var(--line);border-radius:11px;padding:12px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.qrcell .qr{display:block;line-height:0}
.qrcap{font-family:'Oswald';font-weight:700;font-size:13.5px;color:var(--steel);margin-top:9px}
.qccont{font-family:'Oswald';font-weight:700;font-size:17px;color:#b91c1c;letter-spacing:.6px;display:block;margin-top:4px}
.qrcap .sub{display:block;font-family:'Barlow';font-weight:500;font-size:11px;line-height:1.4;color:var(--muted);margin-top:5px}
.qrcap .sub b{color:var(--st-comp-t);font-weight:700}
.qrcap .sub .done{display:block;color:#374151;margin-top:2px}
.qrprint{margin-top:10px;width:100%;border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px;cursor:pointer;font-family:'Oswald';font-weight:600;text-transform:uppercase;letter-spacing:.4px;font-size:11px;color:var(--steel);display:flex;align-items:center;justify-content:center;gap:6px}
.qrprint:hover{background:#6d28d9;color:#fff;border-color:#6d28d9}
.mfoot{padding:13px 18px;display:flex;justify-content:flex-end;gap:9px;border-top:1px solid var(--line2);background:#f7f9fb}
.btn{font-family:'Oswald';text-transform:uppercase;letter-spacing:.5px;font-weight:600;font-size:13px;border:0;cursor:pointer;padding:10px 17px;border-radius:8px}
.btn.primary{background:var(--amber);color:#1c2128}.btn.sec{background:#fff;border:1px solid var(--line);color:var(--muted)}
.print-root{display:none}
@media print{body *{visibility:hidden}.print-root,.print-root *{visibility:visible}.print-root{display:block;position:absolute;inset:0;background:#fff}
.labels{display:flex;flex-wrap:wrap}.label{width:2.5in;height:2.5in;border:1px dashed #999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;page-break-inside:avoid}
.label .lqr{margin-bottom:6px}.label .lt{font-family:'Oswald';font-weight:700;font-size:15px;text-align:center;line-height:1.1}
.label .lc{font-family:'Oswald';font-weight:700;font-size:13px;color:#b91c1c;text-align:center;margin-top:2px}.label .ls{font-size:9.5px;color:#333;text-align:center;margin-top:2px}}

/* ================= MOBILE ================= */
@media(max-width:820px){
  header{top:0}
  .toolbar{flex-wrap:wrap;gap:9px;padding:10px 12px}
  .toolbar .hbtn{order:1}
  .count{order:2;margin-left:auto}
  .search{order:3;width:100%}
  .filter{order:4;width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .filter button{flex:1 0 auto}
  .wrap{padding:0 10px 60px}
  .card{border:0;background:transparent;box-shadow:none;overflow:visible}
  .scroll{overflow:visible}
  table,thead,tbody,tr,td{display:block;width:auto}
  table{min-width:0}
  thead{display:none}
  tbody tr.r{background:#fff;border:1px solid var(--line);border-radius:14px;margin:11px 0;padding:8px 12px 12px;box-shadow:0 2px 6px rgba(16,22,30,.08)}
  tbody tr.r.zebra{background:#fff}
  tbody tr.prio{background:#fff5f5;border-color:#fca5a5}
  tbody td{display:flex;align-items:center;justify-content:space-between;gap:12px;text-align:right;border:0;border-bottom:1px solid var(--line2);padding:9px 0;font-size:14.5px}
  tbody td:last-child{border-bottom:0}
  tbody td.gdiv{border-left:0}
  tbody td::before{content:attr(data-label);font-family:'Oswald';font-weight:600;font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);text-align:left;flex:none}
  tbody td.c-tkt{padding-top:2px}
  tbody td.c-tkt::before{display:none}
  .tktwrap{width:100%;justify-content:space-between}
  .grip{display:none}
  .tkt{font-size:17px;padding:6px 11px 6px 13px}
  .loc{text-align:right}.loc .nm{font-size:15px}
  .pill{font-size:12px;padding:6px 13px}
  .cell,.cell.wide{max-width:none;width:60%}
  .qty{width:64px;height:38px;font-size:17px}
  .notes{max-width:none;width:60%}
  .sch-cell{min-width:0}
  .sched{justify-self:end;grid-template-columns:16px auto}
  .sched input{width:150px;font-size:14px;padding:6px 8px}
  .acts{width:100%;justify-content:flex-end;gap:9px}
  .ib{width:42px;height:38px}.ib.qr{width:48px;height:38px}
  .ib svg{width:18px;height:18px}
  /* detail panel attaches under its card */
  .detail{display:block;margin-top:-11px}
  .detail td{display:block;background:#f4f7fb;border:1px solid var(--line);border-top:0;border-radius:0 0 14px 14px;margin:0 0 11px;box-shadow:none}
  .detail-in{padding:11px 13px}
  .cprog{gap:8px}
  .stages{flex-wrap:wrap;gap:5px}
  .st{flex:1 0 30%;font-size:10.5px;padding:9px 4px}
  .pct{width:auto;min-width:42px}
}
</style>
</head>
<body>
<header id="appHeader">
  <div class="mark">WRS</div>
  <div class="htitle"><h1>Containers</h1><small>Fab &amp; Rebuild Tracker</small></div>
  <div class="sp"></div>
  <button class="hbtn g" onclick="printAll()">⎙ Print QR</button>
</header>
<div class="toolbar">
  <button class="hbtn" onclick="alert('Demo: New Order form would open here.')">+ New Order</button>
  <div class="search"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9aa3af" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input id="search" placeholder="Search ticket, site, container…" oninput="render()"></div>
  <div class="filter" id="filter">
    <button class="active" data-f="all">All</button>
    <button data-f="Pick Up">Pick Up</button>
    <button data-f="New">New</button>
    <button data-f="In-Progress">In-Prog</button>
    <button data-f="Ready for Delivery">Ready</button>
    <button class="dv" data-f="Completed">Delivered</button>
  </div>
  <span class="count" id="count"></span>
</div>
<div class="wrap"><div class="card"><div class="scroll">
<table>
<thead><tr>
  <th>Ticket</th><th>Location</th>
  <th class="gdiv">Status</th><th class="sch-cell">Schedule<small>placed / due</small></th>
  <th class="gdiv">Qty</th><th>Build</th><th>Size</th><th>Load</th><th>Lids</th><th>Casters</th>
  <th class="gdiv">Notes</th><th class="gdiv">QR</th><th></th>
</tr></thead>
<tbody id="b"></tbody>
</table>
</div>
</div></div>

<div class="overlay" id="qrModal"><div class="modal">
  <h2><span>Container QR Codes</span><span class="x" onclick="closeQR()">&times;</span></h2>
  <div class="qrbox"><div class="qt" id="qrT"></div><div class="qsub" id="qrS"></div><div class="qrgrid" id="qrG"></div></div>
  <div class="mfoot"><button class="btn sec" onclick="closeQR()">Close</button><button class="btn primary" onclick="printTicket()">Print All</button></div>
</div></div>
<div class="print-root"><div class="labels" id="printLabels"></div></div>

<script>
const BASE=location.origin+location.pathname;
const SIZES=['1','1.5','2','2.33','2.34','3','4','6','8'];
const CTYPES=[];SIZES.forEach(s=>{CTYPES.push(s+' Yard',s+' Yard Slant');if(s==='2')CTYPES.push('2 Yard Compactor Style');});
const CASTERS=['None','Standard 6" x4 Swivel','Standard 6" 2x Swivel 2x Rigid','Cushion 6"','Cushion 8"','Steel Poly 6" Rigid','Steel Poly 6" Swivel'];
const LIDS=['None','Plastic','Steel'];const BUILDS=['New Container','Rebuilt Container'];
const STAGES_NEW=['Core','Full Weld Core','Pockets','Pads/Casters','Paint','Lids'];
const STAGES_REB=['Removed Bottom','Installed Bottom - Sides','Pads - Casters','Paint'];
const stagesFor=o=>(o&&o.bd==='Rebuilt Container')?STAGES_REB:STAGES_NEW;
const SHORT={'Core':'Core','Full Weld Core':'Full Weld','Pockets':'Pockets','Pads/Casters':'Pads/Cast','Paint':'Paint','Lids':'Lids','Removed Bottom':'Rem. Bottom','Installed Bottom - Sides':'Btm + Sides','Pads - Casters':'Pads/Cast'};
const STATUS={'Pick Up':{c:'p-pick',d:'#b45309'},'New':{c:'p-new',d:'#1d4ed8'},'In-Progress':{c:'p-prog',d:'#6d28d9'},'Completed':{c:'p-comp',d:'#15803d'},'Ready for Delivery':{c:'p-ready',d:'#0e7490'}};
const LOAD={'Front Load':{c:'p-front',d:'#0369a1'},'Rear Load':{c:'p-rear',d:'#9a3412'}};
const FINISHED='Completed'; // pulled out of the main board into the Delivered filter
let D=[
{id:'32862',loc:'Sea Ranch of Boca - Bldg B',st:'New',pl:'2026-04-08',du:'2026-04-22',qty:1,bd:'Rebuilt Container',sz:'2 Yard',ld:'Front Load',li:'Plastic',ca:'Standard 6" 2x Swivel 2x Rigid',no:'Refurbished 2 Cubic Yd. Front Load. Prime + finish paint.',prio:true,pr:[2]},
{id:'31294',loc:'Royal Palm Way',st:'New',pl:'2026-04-08',du:'',qty:1,bd:'New Container',sz:'2 Yard',ld:'Rear Load',li:'Plastic',ca:'None',no:'Order placed 4.8: BUILD 1 x New 2 Yd Rear Load Slant.',pr:[0]},
{id:'32261',loc:'3120 Condominium Association, Inc',st:'In-Progress',pl:'2026-04-10',du:'2026-04-18',qty:2,bd:'New Container',sz:'1 Yard',ld:'Rear Load',li:'Plastic',ca:'Cushion 6"',no:'2 - New 1yd Rear Load Dumpster. Plastic lids.',pr:[6,3]},
{id:'32002',loc:'Beach Point Condominium',st:'In-Progress',pl:'2026-04-11',du:'2026-04-15',qty:1,bd:'New Container',sz:'1 Yard Slant',ld:'Rear Load',li:'Plastic',ca:'Steel Poly 6" Swivel',no:'1 - New 1yd Rear Load Slant Dumpster.',pr:[4]},
{id:'32348',loc:'IL Lugano Condo',st:'New',pl:'',du:'',qty:3,bd:'New Container',sz:'1 Yard',ld:'Rear Load',li:'Plastic',ca:'Cushion 8"',no:'',pr:[0,0,0]},
{id:'31570',loc:'Lake Colony',st:'Ready for Delivery',pl:'2026-04-02',du:'2026-04-20',qty:1,bd:'Rebuilt Container',sz:'4 Yard',ld:'Front Load',li:'None',ca:'Steel Poly 6" Rigid',no:'On truck Friday.',pr:[6]},
{id:'31938',loc:'Casa Del Rio',st:'In-Progress',pl:'2026-06-16',du:'2026-06-30',qty:5,bd:'New Container',sz:'2 Yard',ld:'Front Load',li:'Plastic',ca:'Standard 6" x4 Swivel',no:'Paint Green',pr:[6,4,2,0,0]},
{id:'31845',loc:'Delray Racquet Club',st:'Completed',pl:'2026-03-18',du:'2026-04-01',qty:1,bd:'New Container',sz:'2 Yard',ld:'Front Load',li:'Plastic',ca:'Standard 6" x4 Swivel',no:'Delivered & installed 4/1.',pr:[6]},
];
const expanded=new Set(['32261','31938']);
let curFilter='all',qrId=null;
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const clampQty=v=>{v=parseInt(v,10);if(isNaN(v)||v<1)return 1;return v>10?10:v;};
const opt=(arr,v)=>arr.map(a=>`<option ${a===v?'selected':''}>${esc(a)}</option>`).join('');
const fmtToday=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
const TODAY=fmtToday();
function getProg(o){const n=clampQty(o.qty);const max=stagesFor(o).length;o.pr=(o.pr||[]).slice(0,n).map(v=>Math.min(Math.max(0,v|0),max));while(o.pr.length<n)o.pr.push(0);return o.pr;}
function find(id){return D.find(o=>o.id===id);}

$('filter').querySelectorAll('button').forEach(b=>b.onclick=()=>{$('filter').querySelectorAll('button').forEach(x=>x.classList.remove('active'));b.classList.add('active');curFilter=b.dataset.f;render();});

function render(){
  const q=$('search').value.trim().toLowerCase();
  let list=D.slice();
  if(curFilter==='all')list=list.filter(o=>o.st!==FINISHED);       // main board excludes delivered/finished
  else list=list.filter(o=>o.st===curFilter);                       // exact-status filters (incl. Delivered)
  if(q)list=list.filter(o=>[o.id,o.loc,o.sz,o.no].join(' ').toLowerCase().includes(q));
  const label=curFilter==='Completed'?'delivered':'orders';
  $('count').innerHTML=list.length+' '+label+' &nbsp;•&nbsp; <b>● synced</b>';
  let h='',z=0;
  list.forEach(o=>{
    const open=expanded.has(o.id),st=STATUS[o.st]||STATUS.New,lt=LOAD[o.ld]||LOAD['Front Load'];
    const zc=(z++%2)?' zebra':'';
    const over=o.du&&o.du<TODAY&&o.st!=='Completed';
    h+=`<tr class="r${zc}${o.prio?' prio':''}">
      <td class="c-tkt"><div class="tktwrap"><span class="grip">⠿</span><span class="tkt${open?' open':''}" onclick="toggleExpand('${o.id}')">${esc(o.id)}<span class="cv"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.4"><path d="M6 9l6 6 6-6"/></svg></span></span></div></td>
      <td class="loc" data-label="Location"><div class="nm">${esc(o.loc)}</div></td>
      <td class="gdiv" data-label="Status"><span class="pill ${st.c}" onclick="openPop(event,'${o.id}','st')">${o.st==='In-Progress'?'In-Prog':esc(o.st)}<span class="c">▼</span></span></td>
      <td class="sch-cell" data-label="Schedule"><div class="sched">
        <span class="k">P</span><input type="date" value="${esc(o.pl)}" onchange="setField('${o.id}','pl',this.value)">
        <span class="k">D</span><input type="date" class="${over?'over':''}" value="${esc(o.du)}" onchange="setField('${o.id}','du',this.value)">
      </div></td>
      <td class="gdiv" data-label="Qty"><input class="qty" type="number" min="1" max="10" value="${o.qty}" onchange="setQty('${o.id}',this)"></td>
      <td data-label="Build"><select class="cell ${o.bd==='New Container'?'cnew':'creb'}" onchange="setField('${o.id}','bd',this.value)">${opt(BUILDS,o.bd)}</select></td>
      <td data-label="Size"><select class="cell" onchange="setField('${o.id}','sz',this.value)">${opt(CTYPES,o.sz)}</select></td>
      <td data-label="Load"><span class="pill ${lt.c}" onclick="openPop(event,'${o.id}','ld')">${esc(o.ld)}<span class="c">▼</span></span></td>
      <td data-label="Lids"><select class="cell" onchange="setField('${o.id}','li',this.value)">${opt(LIDS,o.li)}</select></td>
      <td data-label="Casters"><select class="cell wide" onchange="setField('${o.id}','ca',this.value)">${opt(CASTERS,o.ca)}</select></td>
      <td class="gdiv" data-label="Notes"><div class="notes"><textarea onchange="setField('${o.id}','no',this.value)" placeholder="Notes…">${esc(o.no)}</textarea></div></td>
      <td class="gdiv" data-label="QR"><span class="ib qr" onclick="openQR('${o.id}')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3M21 14v7h-7M17 21h.01"/></svg></span></td>
      <td data-label="Actions"><div class="acts">
        <span class="ib flag${o.prio?' on':''}" onclick="togglePrio('${o.id}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="${o.prio?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M5 22V4M5 4h11l-2.5 4 2.5 4H5"/></svg></span>
        <span class="ib edit" onclick="alert('Demo: edit form would open.')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></span>
        <span class="ib mail" onclick="emailWO('${o.id}')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 6-10 7L2 6"/></svg></span>
        <span class="ib del" onclick="alert('Demo: delete')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg></span>
      </div></td></tr>`;
    if(open){
      const stages=stagesFor(o),N=stages.length,prog=getProg(o);let pr='';
      prog.forEach((dn,i)=>{let s='';for(let k=1;k<=N;k++)s+=`<div class="st${k<=dn?' done':''}" onclick="setStage('${o.id}',${i},${k})">${SHORT[stages[k-1]]||stages[k-1]}</div>`;
        pr+=`<div class="cprog"><div class="cn">#${i+1}</div><div class="stages">${s}</div><div class="pct">${Math.round(dn/N*100)}%</div></div>`;});
      h+=`<tr class="detail"><td colspan="13"><div class="detail-in"><div class="dhead">Build progress — ${prog.length} container${prog.length>1?'s':''} · ${esc(o.sz)}</div>${pr}</div></td></tr>`;
    }
  });
  $('b').innerHTML=h||'<tr><td colspan="13" style="padding:30px;text-align:center;color:#9aa3af">No containers in this view.</td></tr>';
}
function toggleExpand(id){expanded.has(id)?expanded.delete(id):expanded.add(id);render();}
function setField(id,f,v){const o=find(id);if(o){o[f]=v;render();}}
function setQty(id,el){const o=find(id);if(!o)return;o.qty=clampQty(el.value);getProg(o);render();}
function setStage(id,ci,stage){const o=find(id);if(!o)return;const a=getProg(o);a[ci]=(a[ci]===stage)?stage-1:stage;if(a[ci]<0)a[ci]=0;render();}
function togglePrio(id){const o=find(id);if(o){o.prio=!o.prio;render();}}
function emailWO(id){const o=find(id);if(!o)return;
  const subj=`Container Work Order — ${o.loc||o.id} (Ticket ${o.id})`;
  const body=[
    `Ticket: ${o.id}`,
    `Location: ${o.loc||''}`,
    `Status: ${o.st}`,
    `Qty: ${o.qty}`,
    `Build: ${o.bd}`,
    `Container Size: ${o.sz}`,
    `Load Style: ${o.ld}`,
    `Lids: ${o.li}`,
    `Casters: ${o.ca}`,
    o.pl?`Order Placed: ${o.pl}`:'',
    o.du?`Projected Completion: ${o.du}`:'',
    o.no?`Notes: ${o.no}`:''
  ].filter(Boolean).join('\n');
  window.location.href='mailto:don@gtsupplies.com?subject='+encodeURIComponent(subj)+'&body='+encodeURIComponent(body);
}
let pop=null;
function openPop(e,id,field){e.stopPropagation();closePop();const map=field==='st'?STATUS:LOAD;pop=document.createElement('div');pop.className='pop';
  Object.keys(map).forEach(k=>{const b=document.createElement('button');b.innerHTML=`<span class="dot" style="background:${map[k].d}"></span>${k}`;b.onclick=()=>{find(id)[field]=k;closePop();render();};pop.appendChild(b);});
  document.body.appendChild(pop);const r=e.currentTarget.getBoundingClientRect();pop.style.top=(r.bottom+5)+'px';pop.style.left=Math.min(r.left,innerWidth-pop.offsetWidth-12)+'px';}
function closePop(){if(pop){pop.remove();pop=null;}}
document.addEventListener('click',closePop);
/* QR */
const qurl=(o,ci)=>BASE+'?ticket='+encodeURIComponent(o.id)+'&c='+ci;
const doneList=(d,stages)=>d<=0?'Not started':stages.slice(0,d).join(', ');
function openQR(id){const o=find(id);if(!o)return;qrId=id;$('qrT').textContent=o.loc||o.id;$('qrS').textContent=o.sz;
  const stages=stagesFor(o),N=stages.length;
  const g=$('qrG');g.innerHTML='';getProg(o).forEach((dn,i)=>{
    const cell=document.createElement('div');cell.className='qrcell';const q=document.createElement('div');q.className='qr';
    new QRCode(q,{text:qurl(o,i+1),width:140,height:140,correctLevel:QRCode.CorrectLevel.M});
    const pct=Math.round(dn/N*100);
    const cap=document.createElement('div');cap.className='qrcap';cap.innerHTML=`${esc(o.loc||o.id)}<span class="qccont">Container #${i+1}</span><span class="sub"><b>${pct}% complete</b><span class="done">${dn<=0?'Not started':'Done: '+esc(doneList(dn,stages))}</span></span>`;
    const btn=document.createElement('button');btn.className='qrprint';btn.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/></svg>Print`;
    btn.onclick=()=>printLabel(o.id,i+1);cell.append(q,cap,btn);g.appendChild(cell);});
  $('qrModal').classList.add('open');}
function closeQR(){$('qrModal').classList.remove('open');}
function mkLabel(o,ci){const w=document.createElement('div');w.className='label';const qd=document.createElement('div');qd.className='lqr';
  new QRCode(qd,{text:qurl(o,ci),width:130,height:130,correctLevel:QRCode.CorrectLevel.M});
  const t=document.createElement('div');t.className='lt';t.textContent=o.loc||o.id;
  const c=document.createElement('div');c.className='lc';c.textContent='Container #'+ci;
  const s=document.createElement('div');s.className='ls';s.textContent='Ticket '+o.id+' • '+o.sz;w.append(qd,t,c,s);return w;}
function printLabel(id,ci){const o=find(id);const box=$('printLabels');box.innerHTML='';box.appendChild(mkLabel(o,ci));setTimeout(()=>print(),200);}
function printTicket(){const o=find(qrId);const box=$('printLabels');box.innerHTML='';for(let i=1;i<=clampQty(o.qty);i++)box.appendChild(mkLabel(o,i));setTimeout(()=>print(),300);}
function printAll(){const box=$('printLabels');box.innerHTML='';D.forEach(o=>{for(let i=1;i<=clampQty(o.qty);i++)box.appendChild(mkLabel(o,i));});setTimeout(()=>print(),350);}
function syncHeaderH(){const h=document.getElementById('appHeader');if(h)document.documentElement.style.setProperty('--hh',h.offsetHeight+'px');}
window.addEventListener('resize',syncHeaderH);window.addEventListener('load',syncHeaderH);setTimeout(syncHeaderH,300);
syncHeaderH();
render();
</script>
</body>
</html>
