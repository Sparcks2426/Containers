<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WRS Containers — Compact Redesign (Interactive Mockup)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --hh:64px;
  --steel:#1c2128;--line:#dde2e9;--line2:#eef1f5;--board:#eef1f4;--card:#fff;--ink:#1c2128;--muted:#6b7280;--amber:#f5a623;
  --st-pick-b:#fef3c7;--st-pick-t:#b45309;--st-new-b:#dbeafe;--st-new-t:#1d4ed8;--st-prog-b:#ede9fe;--st-prog-t:#6d28d9;
  --st-comp-b:#dcfce7;--st-comp-t:#15803d;--st-ready-b:#cffafe;--st-ready-t:#0e7490;
  --lt-front-b:#e0f2fe;--lt-front-t:#0369a1;--lt-rear-b:#ffedd5;--lt-rear-t:#9a3412;
}
*{box-sizing:border-box}
body{margin:0;font-family:'Barlow',system-ui,sans-serif;color:var(--ink);background:var(--board);font-size:14px}
header{background:linear-gradient(108deg,#171c23,#212b39 60%,#2b2533);color:#fff;padding:11px 16px;display:flex;align-items:center;gap:12px;border-bottom:3px solid var(--amber);position:sticky;top:0;z-index:30}
.mark{width:38px;height:38px;border-radius:7px;background:#fff;display:grid;place-items:center;font-family:'Oswald';font-weight:700;color:#000;font-size:13px;letter-spacing:.5px}
.htitle h1{font-family:'Oswald';font-weight:600;font-size:19px;margin:0;letter-spacing:.5px;text-transform:uppercase}
.htitle small{font-size:9.5px;letter-spacing:1.6px;color:#9aa4b1;text-transform:uppercase}
.sp{flex:1}
.hbtn{font-family:'Oswald';text-transform:uppercase;letter-spacing:.5px;font-weight:600;font-size:13px;border:0;cursor:pointer;padding:9px 14px;border-radius:7px;background:var(--amber);color:#1c2128}
.hbtn.g{background:transparent;color:#cfd6df;border:1px solid #3a434e}
.tag{display:inline-block;background:#fde68a;color:#92400e;font-family:'Oswald';font-weight:600;font-size:10px;letter-spacing:.5px;text-transform:uppercase;padding:3px 8px;border-radius:5px;margin-left:8px}
.toolbar{display:flex;align-items:center;gap:10px;padding:11px 16px}
.search{display:flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px 12px;width:340px;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.search input{border:0;outline:0;font:inherit;width:100%;background:transparent}
.filter{display:flex;background:#fff;border:1px solid var(--line);border-radius:9px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.filter button{border:0;background:transparent;font-family:'Oswald';font-weight:500;font-size:12px;letter-spacing:.3px;text-transform:uppercase;padding:9px 12px;cursor:pointer;color:var(--muted);border-right:1px solid var(--line2);white-space:nowrap}
.filter button.active{background:linear-gradient(180deg,#2563eb,#1d4ed8);color:#fff}
.filter button.dv.active{background:linear-gradient(180deg,#16a34a,#15803d)}
.filter button:last-child{border-right:0}
.count{margin-left:auto;font-family:'Oswald';font-size:13px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
.count b{color:#15803d}
.wrap{padding:0 16px 50px}
.card{background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 1px 3px rgba(16,22,30,.07)}
.scroll{overflow:visible}
table{border-collapse:collapse;width:100%;min-width:1220px}
thead th{position:sticky;top:var(--hh,64px);z-index:20;background:linear-gradient(180deg,#2d3744,#222a34);color:#e2e8f0;font-family:'Oswald';font-weight:500;font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;text-align:center;padding:9px 9px;white-space:nowrap;border-bottom:2px solid var(--amber)}
thead th small{display:block;font-size:8.5px;color:#9aa9bb;letter-spacing:.3px;font-weight:400}
.gdiv{border-left:2px solid #3a4655}
tbody td.gdiv{border-left:2px solid #e6eaf0}
tbody td{padding:7px 9px;border-bottom:1px solid var(--line2);text-align:center;vertical-align:middle;font-size:13.5px}
tbody tr.r.zebra{background:#f8fafc}
tbody tr.r:hover{background:#eff5ff}
tbody tr.r:hover td.c-tkt{box-shadow:inset 3px 0 0 var(--amber)}
tbody tr.prio td.c-tkt{box-shadow:inset 3px 0 0 #dc2626}
tbody tr.prio{background:#fff5f5}
.tktwrap{display:flex;align-items:center;gap:8px;justify-content:flex-start}
.grip{color:#c2cad6;cursor:grab;font-size:14px;user-select:none}
.tkt{display:inline-flex;align-items:center;gap:7px;cursor:pointer;background:#eef2f8;border:1px solid var(--line);border-radius:8px;padding:4px 8px 4px 10px;color:#b91c1c;font-family:'Oswald';font-weight:700;font-size:15px;letter-spacing:.5px;line-height:1}
.tkt.open{background:#fff6e3;border-color:var(--amber)}
.tkt .cv{display:grid;place-items:center;width:18px;height:18px;border-radius:6px;background:var(--amber);color:#1c2128}
.tkt .cv svg{transition:transform .15s}
.tkt:not(.open) .cv svg{transform:rotate(-90deg)}
.loc{text-align:left;line-height:1.2}
.loc .nm{font-weight:600;font-size:13.5px}
.pill{display:inline-flex;align-items:center;gap:5px;font-family:'Oswald';font-weight:600;letter-spacing:.3px;text-transform:uppercase;font-size:11px;padding:5px 11px;border-radius:999px;cursor:pointer;white-space:nowrap}
.pill .c{font-size:7px;opacity:.6}
.p-new{background:var(--st-new-b);color:var(--st-new-t)}.p-prog{background:var(--st-prog-b);color:var(--st-prog-t)}
.p-pick{background:var(--st-pick-b);color:var(--st-pick-t)}.p-comp{background:var(--st-comp-b);color:var(--st-comp-t)}.p-ready{background:var(--st-ready-b);color:var(--st-ready-t)}
.p-front{background:var(--lt-front-b);color:var(--lt-front-t)}.p-rear{background:var(--lt-rear-b);color:var(--lt-rear-t)}
/* schedule — aligned label+input grid */
.sch-cell{min-width:158px}
.sched{display:inline-grid;grid-template-columns:14px auto;align-items:center;gap:5px 8px;justify-items:start}
.sched .k{color:var(--muted);font-weight:700;font-size:11px;font-family:'Oswald';justify-self:center}
.sched input{border:1px solid var(--line);border-radius:6px;padding:4px 6px;font:inherit;font-size:12px;width:128px;background:#fbfcfd}
.sched input.over{color:#dc2626;border-color:#fca5a5;background:#fff5f5}
.cell{font-family:'Barlow';font-size:13px;font-weight:500;padding:6px 8px;border:1px solid var(--line);border-radius:7px;background:#fbfcfd;color:var(--ink);cursor:pointer;max-width:138px}
.cell:focus{outline:2px solid var(--amber);border-color:var(--amber)}
.cell.wide{max-width:172px}
.cell.cnew{color:var(--st-comp-t);font-weight:600}.cell.creb{color:var(--st-prog-t);font-weight:600}
.qty{width:52px;height:34px;border:1px solid var(--line);border-radius:7px;text-align:center;font-weight:700;font-family:'Oswald';font-size:16px;background:#fbfcfd}
.notes{max-width:215px}
.notes textarea{width:100%;min-height:34px;resize:vertical;border:1px solid var(--line);border-radius:7px;padding:6px 8px;font:inherit;font-size:12.5px;background:#fbfcfd;text-align:left}
.ib{border:1px solid var(--line);background:#fff;border-radius:7px;width:34px;height:32px;display:inline-grid;place-items:center;cursor:pointer;color:var(--muted)}
.ib.qr{width:40px;height:34px;color:#6d28d9;border-color:#ddd6fe;background:#f5f3ff}
.ib.flag{color:#b45309;border-color:#fde68a;background:#fffbeb}.ib.flag.on{color:#fff;background:#dc2626;border-color:#dc2626}
.ib.edit{color:#1d4ed8;border-color:#bfdbfe;background:#eff6ff}
.ib.mail{color:#0e7490;border-color:#a5f3fc;background:#ecfeff}
.ib.del{color:#dc2626;border-color:#fecaca;background:#fef2f2}
.acts{display:flex;gap:6px;justify-content:center}
.pop{position:fixed;z-index:80;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 10px 30px rgba(16,22,30,.18);padding:6px;min-width:160px}
.pop button{display:flex;align-items:center;gap:9px;width:100%;border:0;background:transparent;font:inherit;font-size:14px;font-weight:500;padding:8px 10px;border-radius:7px;cursor:pointer;text-align:left}
.pop button:hover{background:var(--line2)}.pop .dot{width:11px;height:11px;border-radius:50%}
.detail td{background:#eef2f8;text-align:left;padding:0;box-shadow:inset 0 4px 7px -5px rgba(0,0,0,.2)}
.detail-in{padding:11px 16px}
.dhead{font-family:'Oswald';font-weight:600;font-size:12px;letter-spacing:.5px;text-transform:uppercase;color:var(--steel);margin-bottom:9px}
.cprog{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.cn{font-family:'Oswald';font-weight:700;width:28px;text-align:center;font-size:13.5px}
.stages{display:flex;flex:1;gap:4px}
.st{flex:1;border:1px solid var(--line);background:#fff;border-radius:6px;padding:8px 4px;font-family:'Oswald';font-weight:600;font-size:10px;letter-spacing:.2px;text-transform:uppercase;color:#97a0ad;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.st:hover{border-color:#16a34a;color:#16a34a}
.st.done{background:linear-gradient(180deg,#22c55e,#15803d);color:#fff;border-color:#15803d}
.pct{font-family:'Oswald';font-weight:700;color:#15803d;width:46px;text-align:right;font-size:13.5px}
.legend{padding:13px 16px;color:var(--muted);font-size:13px;display:flex;gap:18px;flex-wrap:wrap}
.legend b{color:var(--ink)}
/* QR modal */
.overlay{position:fixed;inset:0;background:rgba(16,22,30,.55);backdrop-filter:blur(3px);z-index:90;display:none;align-items:flex-start;justify-content:center;padding:36px 14px;overflow:auto}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;width:100%;max-width:560px;box-shadow:0 22px 60px rgba(0,0,0,.4);overflow:hidden}
.modal h2{font-family:'Oswald';text-transform:uppercase;letter-spacing:.5px;background:var(--steel);color:#fff;margin:0;padding:15px 18px;font-size:18px;border-bottom:3px solid var(--amber);display:flex;justify-content:space-between;align-items:center}
.modal h2 .x{cursor:pointer;color:#9aa4b1;font-size:23px}.modal h2 .x:hover{color:#fff}
.qrbox{padding:20px;text-align:center}
.qt{font-family:'Oswald';font-weight:700;font-size:21px;letter-spacing:.5px}.qsub{color:var(--muted);font-size:13px;margin-top:2px}
.qrgrid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:16px;max-height:56vh;overflow:auto}
.qrcell{border:1px solid var(--line);border-radius:11px;padding:12px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.qrcell .qr{display:block;line-height:0}
.qrcap{font-family:'Oswald';font-weight:700;font-size:13.5px;color:var(--steel);margin-top:9px}
.qccont{font-family:'Oswald';font-weight:700;font-size:17px;color:#b91c1c;letter-spacing:.6px;display:block;margin-top:4px}
.qrcap .sub{display:block;font-family:'Barlow';font-weight:500;font-size:11px;line-height:1.4;color:var(--muted);margin-top:5px}
.qrcap .sub b{color:var(--st-comp-t);font-weight:700}
.qrcap .sub .done{display:block;color:#374151;margin-top:2px}
.qrprint{margin-top:10px;width:100%;border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px;cursor:pointer;font-family:'Oswald';font-weight:600;text-transform:uppercase;letter-spacing:.4px;font-size:11px;color:var(--steel);display:flex;align-items:center;justify-content:center;gap:6px}
.qrprint:hover{background:#6d28d9;color:#fff;border-color:#6d28d9}
.mfoot{padding:13px 18px;display:flex;justify-content:flex-end;gap:9px;border-top:1px solid var(--line2);background:#f7f9fb}
.btn{font-family:'Oswald';text-transform:uppercase;letter-spacing:.5px;font-weight:600;font-size:13px;border:0;cursor:pointer;padding:10px 17px;border-radius:8px}
.btn.primary{background:var(--amber);color:#1c2128}.btn.sec{background:#fff;border:1px solid var(--line);color:var(--muted)}
.form{padding:18px;display:grid;grid-template-columns:1fr 1fr;gap:13px 14px;max-height:64vh;overflow:auto}
.fld{display:flex;flex-direction:column;gap:5px}
.fld.full{grid-column:1/-1}
.fld label{font-family:'Oswald';font-weight:600;font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted)}
.fld input,.fld select,.fld textarea{border:1px solid var(--line);border-radius:8px;padding:9px 10px;font:inherit;font-size:14px;background:#fbfcfd;color:var(--ink)}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:2px solid var(--amber);border-color:var(--amber)}
.fld textarea{min-height:62px;resize:vertical}
.fld.chk{flex-direction:row;align-items:center;gap:9px}
.fld.chk input{width:18px;height:18px}
.fld.chk label{text-transform:none;font-size:13.5px;color:var(--ink);font-family:'Barlow';letter-spacing:0}
@media(max-width:560px){.form{grid-template-columns:1fr}}
.print-root{display:none}
@media print{body *{visibility:hidden}.print-root,.print-root *{visibility:visible}.print-root{display:block;position:absolute;inset:0;background:#fff}
.labels{display:flex;flex-wrap:wrap}.label{width:2.5in;height:2.5in;border:1px dashed #999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;page-break-inside:avoid}
.label .lqr{margin-bottom:6px}.label .lt{font-family:'Oswald';font-weight:700;font-size:15px;text-align:center;line-height:1.1}
.label .lc{font-family:'Oswald';font-weight:700;font-size:13px;color:#b91c1c;text-align:center;margin-top:2px}.label .ls{font-size:9.5px;color:#333;text-align:center;margin-top:2px}}

/* ================= MOBILE ================= */
@media(max-width:820px){
  header{top:0}
  .toolbar{flex-wrap:wrap;gap:9px;padding:10px 12px}
  .toolbar .hbtn{order:1}
  .count{order:2;margin-left:auto}
  .search{order:3;width:100%}
  .filter{order:4;width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .filter button{flex:1 0 auto}
  .wrap{padding:0 10px 60px}
  .card{border:0;background:transparent;box-shadow:none;overflow:visible}
  .scroll{overflow:visible}
  table,thead,tbody,tr,td{display:block;width:auto}
  table{min-width:0}
  thead{display:none}
  tbody tr.r{background:#fff;border:1px solid var(--line);border-radius:14px;margin:11px 0;padding:8px 12px 12px;box-shadow:0 2px 6px rgba(16,22,30,.08)}
  tbody tr.r.zebra{background:#fff}
  tbody tr.prio{background:#fff5f5;border-color:#fca5a5}
  tbody td{display:flex;align-items:center;justify-content:space-between;gap:12px;text-align:right;border:0;border-bottom:1px solid var(--line2);padding:9px 0;font-size:14.5px}
  tbody td:last-child{border-bottom:0}
  tbody td.gdiv{border-left:0}
  tbody td::before{content:attr(data-label);font-family:'Oswald';font-weight:600;font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);text-align:left;flex:none}
  tbody td.c-tkt{padding-top:2px}
  tbody td.c-tkt::before{display:none}
  .tktwrap{width:100%;justify-content:space-between}
  .grip{display:none}
  .tkt{font-size:17px;padding:6px 11px 6px 13px}
  .loc{text-align:right}.loc .nm{font-size:15px}
  .pill{font-size:12px;padding:6px 13px}
  .cell,.cell.wide{max-width:none;width:60%}
  .qty{width:64px;height:38px;font-size:17px}
  .notes{max-width:none;width:60%}
  .sch-cell{min-width:0}
  .sched{justify-self:end;grid-template-columns:16px auto}
  .sched input{width:150px;font-size:14px;padding:6px 8px}
  .acts{width:100%;justify-content:flex-end;gap:9px}
  .ib{width:42px;height:38px}.ib.qr{width:48px;height:38px}
  .ib svg{width:18px;height:18px}
  /* detail panel attaches under its card */
  .detail{display:block;margin-top:-11px}
  .detail td{display:block;background:#f4f7fb;border:1px solid var(--line);border-top:0;border-radius:0 0 14px 14px;margin:0 0 11px;box-shadow:none}
  .detail-in{padding:11px 13px}
  .cprog{gap:8px}
  .stages{flex-wrap:wrap;gap:5px}
  .st{flex:1 0 30%;font-size:10.5px;padding:9px 4px}
  .pct{width:auto;min-width:42px}
}
.vtabs{display:flex;background:#fff;border:1px solid var(--line);border-radius:9px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.vtabs button{border:0;background:transparent;font-family:'Oswald';font-weight:600;font-size:12.5px;letter-spacing:.4px;text-transform:uppercase;padding:9px 15px;cursor:pointer;color:var(--muted);border-right:1px solid var(--line2);white-space:nowrap}
.vtabs button:last-child{border-right:0}
.vtabs button.active{background:var(--steel);color:#fff}
.sync{font-family:'Oswald';font-size:12px;letter-spacing:.5px;text-transform:uppercase;margin-left:12px;color:#16a34a;white-space:nowrap}
tbody tr.flash{animation:flash 2.2s ease}
@keyframes flash{0%,35%{background:#fff7df}100%{background:transparent}}
</style>
</head>
<body>
<header id="appHeader">
  <div class="mark">WRS</div>
  <div class="htitle"><h1>Containers</h1><small>Fab &amp; Rebuild Tracker</small></div>
  <div class="sp"></div>
  <button class="hbtn g" onclick="loadRemote(true)">⟳ Refresh</button>
  <button class="hbtn g" onclick="printAll()">⎙ Print QR</button>
</header>
<div class="toolbar">
  <div class="vtabs" id="vtabs"><button class="active" data-v="orders">Work Orders</button><button data-v="stock">Stock</button></div>
  <button class="hbtn" id="newBtn" onclick="newClick()">+ New Order</button>
  <div class="search"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9aa3af" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input id="search" placeholder="Search ticket, site, container…" oninput="render()"></div>
  <div class="filter" id="filter">
    <button class="active" data-f="all">All</button>
    <button data-f="Pick Up">Pick Up</button>
    <button data-f="New">New</button>
    <button data-f="In-Progress">In-Prog</button>
    <button data-f="Ready for Delivery">Ready</button>
    <button class="dv" data-f="Completed">Delivered</button>
  </div>
  <span class="count" id="count"></span><span class="sync" id="sync"></span>
</div>
<div class="wrap"><div class="card"><div class="scroll">
<table>
<thead><tr id="thr"></tr></thead>
<tbody id="b"></tbody>
</table>
</div>
</div></div>

<div class="overlay" id="qrModal"><div class="modal">
  <h2><span>Container QR Codes</span><span class="x" onclick="closeQR()">&times;</span></h2>
  <div class="qrbox"><div class="qt" id="qrT"></div><div class="qsub" id="qrS"></div><div class="qrgrid" id="qrG"></div></div>
  <div class="mfoot"><button class="btn sec" onclick="closeQR()">Close</button><button class="btn primary" onclick="printTicket()">Print All</button></div>
</div></div>
<div class="overlay" id="formModal"><div class="modal">
  <h2><span id="formTitle">New Order</span><span class="x" onclick="closeForm()">&times;</span></h2>
  <div class="form">
    <div class="fld"><label>Ticket #</label><input id="f_id" placeholder="e.g. 32999"></div>
    <div class="fld"><label>Status</label><select id="f_st"></select></div>
    <div class="fld full"><label>Location / Site</label><input id="f_loc" placeholder="Site name"></div>
    <div class="fld full"><label>Address</label><input id="f_addr" placeholder="Street, City, ST ZIP"></div>
    <div class="fld"><label>Phone</label><input id="f_ph" placeholder="(000) 000-0000"></div>
    <div class="fld"><label>Order Placed</label><input type="date" id="f_pl"></div>
    <div class="fld"><label>Projected Completion</label><input type="date" id="f_du"></div>
    <div class="fld"><label>Qty</label><input type="number" min="1" max="10" id="f_qty" value="1"></div>
    <div class="fld"><label>Build</label><select id="f_bd"></select></div>
    <div class="fld"><label>Container Size</label><select id="f_sz"></select></div>
    <div class="fld"><label>Load Style</label><select id="f_ld"></select></div>
    <div class="fld"><label>Lids</label><select id="f_li"></select></div>
    <div class="fld"><label>Casters</label><select id="f_ca"></select></div>
    <div class="fld chk full"><input type="checkbox" id="f_prio"><label for="f_prio">Mark as priority</label></div>
    <div class="fld full"><label>Notes</label><textarea id="f_no" placeholder="Notes…"></textarea></div>
  </div>
  <div class="mfoot"><button class="btn sec" onclick="closeForm()">Cancel</button><button class="btn primary" onclick="saveForm()">Save Order</button></div>
</div></div>
<div class="overlay" id="stockModal"><div class="modal">
  <h2><span id="stockTitle">New Stock Container</span><span class="x" onclick="closeStockForm()">&times;</span></h2>
  <div class="form">
    <div class="fld full"><label>Customer Location</label><input id="s_loc" placeholder="Location name"></div>
    <div class="fld"><label>Build</label><select id="s_bd"></select></div>
    <div class="fld"><label>Qty</label><input type="number" min="1" max="10" id="s_qty" value="1"></div>
    <div class="fld"><label>Container Size</label><select id="s_sz"></select></div>
    <div class="fld"><label>Load Style</label><select id="s_ld"></select></div>
    <div class="fld"><label>Lids</label><select id="s_li"></select></div>
    <div class="fld"><label>Casters</label><select id="s_ca"></select></div>
    <div class="fld full"><label>Notes</label><textarea id="s_no" placeholder="Notes…"></textarea></div>
  </div>
  <div class="mfoot"><button class="btn sec" onclick="closeStockForm()">Cancel</button><button class="btn primary" onclick="stSaveForm()">Save Stock</button></div>
</div></div>
<div class="print-root"><div class="labels" id="printLabels"></div></div>

<script>
/* ===== CONFIG ===== */
const CONFIG={
  API_URL:"https://script.google.com/macros/s/AKfycbyOxDL3K5Mlc4PMLbvKAkUJFpou8VziaMfEGQevi0mnZ6uvwv_KWs1S3hI_9SRHIaXx/exec",
  EMAIL_TO:"don@gtsupplies.com",
  BASE_URL:location.origin+location.pathname
};
const BASE=CONFIG.BASE_URL;
const SIZES=['1','1.5','2','2.33','2.34','3','4','6','8'];
const CTYPES=[];SIZES.forEach(s=>{CTYPES.push(s+' Yard',s+' Yard Slant');if(s==='2')CTYPES.push('2 Yard Compactor Style');});
const CASTERS=['None','Standard 6" x4 Swivel','Standard 6" 2x Swivel 2x Rigid','Cushion 6"','Cushion 8"','Steel Poly 6" Rigid','Steel Poly 6" Swivel'];
const LIDS=['None','Plastic','Steel'];const BUILDS=['New Container','Rebuilt Container'];const LOADS=['Front Load','Rear Load'];
const STAGES_NEW=['Core','Full Weld Core','Pockets','Pads/Casters','Paint','Lids'];
const STAGES_REB=['Removed Bottom','Installed Bottom - Sides','Pads - Casters','Paint'];
const stagesFor=o=>(o&&o.bd==='Rebuilt Container')?STAGES_REB:STAGES_NEW;
const SHORT={'Core':'Core','Full Weld Core':'Full Weld','Pockets':'Pockets','Pads/Casters':'Pads/Cast','Paint':'Paint','Lids':'Lids','Removed Bottom':'Rem. Bottom','Installed Bottom - Sides':'Btm + Sides','Pads - Casters':'Pads/Cast'};
const STATUS={'Pick Up':{c:'p-pick',d:'#b45309'},'New':{c:'p-new',d:'#1d4ed8'},'In-Progress':{c:'p-prog',d:'#6d28d9'},'Completed':{c:'p-comp',d:'#15803d'},'Ready for Delivery':{c:'p-ready',d:'#0e7490'}};
const LOAD={'Front Load':{c:'p-front',d:'#0369a1'},'Rear Load':{c:'p-rear',d:'#9a3412'}};
const FINISHED='Completed';
const ORDERS_HEAD=`<th>Ticket</th><th>Location</th><th class="gdiv">Status</th><th class="sch-cell">Schedule<small>placed / due</small></th><th class="gdiv">Qty</th><th>Build</th><th>Size</th><th>Load</th><th>Lids</th><th>Casters</th><th class="gdiv">Notes</th><th class="gdiv">QR</th><th></th>`;
const STOCK_HEAD=`<th></th><th>Customer Location</th><th class="gdiv">Build</th><th>Size</th><th>Load</th><th>Lids</th><th>Casters</th><th class="gdiv">Qty</th><th>Notes</th><th class="gdiv">QR</th><th></th>`;
const SVG_QR='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3M21 14v7h-7M17 21h.01"/></svg>';
const SVG_EDIT='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>';
const SVG_DEL='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>';
const SVG_CARET='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.4"><path d="M6 9l6 6 6-6"/></svg>';

let D=[],S=[];
const expanded=new Set(),expS=new Set();
let view='orders',curFilter='all',qrId=null,qrKind='',editId=null,editIdS=null,deepDone=false,formFilled=false,stockFilled=false;
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const clampQty=v=>{v=parseInt(v,10);if(isNaN(v)||v<1)return 1;return v>10?10:v;};
const opt=(arr,v)=>arr.map(a=>`<option ${a===v?'selected':''}>${esc(a)}</option>`).join('');
const fmtToday=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
const TODAY=fmtToday();
const dateStr=v=>{if(!v)return '';const s=String(v);return s.length>=10?s.slice(0,10):s;};
function uid(){return 'c'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function getProg(o){const n=clampQty(o.qty);const max=stagesFor(o).length;o.pr=(o.pr||[]).slice(0,n).map(v=>Math.min(Math.max(0,v|0),max));while(o.pr.length<n)o.pr.push(0);return o.pr;}
function find(id){return D.find(o=>o.id===id);}
function findS(id){return S.find(o=>o.id===id);}

$('vtabs').querySelectorAll('button').forEach(b=>b.onclick=()=>{view=b.dataset.v;$('search').value='';renderView();});
$('filter').querySelectorAll('button').forEach(b=>b.onclick=()=>{$('filter').querySelectorAll('button').forEach(x=>x.classList.remove('active'));b.classList.add('active');curFilter=b.dataset.f;renderOrders();});
function newClick(){view==='stock'?stForm():openForm();}
function render(){renderView();}
function renderView(){
  $('newBtn').textContent=view==='stock'?'+ New Stock':'+ New Order';
  $('filter').style.display=view==='stock'?'none':'';
  $('vtabs').querySelectorAll('button').forEach(b=>b.classList.toggle('active',b.dataset.v===view));
  if(view==='stock')renderStock();else renderOrders();
}

/* ===== ORDERS board ===== */
function renderOrders(){
  $('thr').innerHTML=ORDERS_HEAD;
  const q=$('search').value.trim().toLowerCase();
  let list=D.slice();
  if(curFilter==='all')list=list.filter(o=>o.st!==FINISHED);
  else list=list.filter(o=>o.st===curFilter);
  if(q)list=list.filter(o=>[o.tid,o.loc,o.sz,o.no].join(' ').toLowerCase().includes(q));
  const label=curFilter==='Completed'?'delivered':'orders';
  $('count').textContent=list.length+' '+label;
  let h='',z=0;
  list.forEach(o=>{
    const open=expanded.has(o.id),st=STATUS[o.st]||STATUS.New,lt=LOAD[o.ld]||LOAD['Front Load'];
    const zc=(z++%2)?' zebra':'';const over=o.du&&o.du<TODAY&&o.st!=='Completed';
    h+=`<tr class="r${zc}${o.prio?' prio':''}" data-rowid="${o.id}">
      <td class="c-tkt"><div class="tktwrap"><span class="grip">⠿</span><span class="tkt${open?' open':''}" onclick="toggleExpand('${o.id}')">${esc(o.tid||o.id)}<span class="cv">${SVG_CARET}</span></span></div></td>
      <td class="loc" data-label="Location"><div class="nm">${esc(o.loc)}</div></td>
      <td class="gdiv" data-label="Status"><span class="pill ${st.c}" onclick="openPop(event,'${o.id}','st')">${o.st==='In-Progress'?'In-Prog':esc(o.st)}<span class="c">▼</span></span></td>
      <td class="sch-cell" data-label="Schedule"><div class="sched">
        <span class="k">P</span><input type="date" value="${esc(o.pl)}" onchange="setField('${o.id}','pl',this.value)">
        <span class="k">D</span><input type="date" class="${over?'over':''}" value="${esc(o.du)}" onchange="setField('${o.id}','du',this.value)">
      </div></td>
      <td class="gdiv" data-label="Qty"><input class="qty" type="number" min="1" max="10" value="${o.qty}" onchange="setQty('${o.id}',this)"></td>
      <td data-label="Build"><select class="cell ${o.bd==='New Container'?'cnew':'creb'}" onchange="setField('${o.id}','bd',this.value)">${opt(BUILDS,o.bd)}</select></td>
      <td data-label="Size"><select class="cell" onchange="setField('${o.id}','sz',this.value)">${opt(CTYPES,o.sz)}</select></td>
      <td data-label="Load"><span class="pill ${lt.c}" onclick="openPop(event,'${o.id}','ld')">${esc(o.ld)}<span class="c">▼</span></span></td>
      <td data-label="Lids"><select class="cell" onchange="setField('${o.id}','li',this.value)">${opt(LIDS,o.li)}</select></td>
      <td data-label="Casters"><select class="cell wide" onchange="setField('${o.id}','ca',this.value)">${opt(CASTERS,o.ca)}</select></td>
      <td class="gdiv" data-label="Notes"><div class="notes"><textarea onchange="setField('${o.id}','no',this.value)" placeholder="Notes…">${esc(o.no)}</textarea></div></td>
      <td class="gdiv" data-label="QR"><span class="ib qr" onclick="openQR('${o.id}','order')">${SVG_QR}</span></td>
      <td data-label="Actions"><div class="acts">
        <span class="ib flag${o.prio?' on':''}" onclick="togglePrio('${o.id}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="${o.prio?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M5 22V4M5 4h11l-2.5 4 2.5 4H5"/></svg></span>
        <span class="ib edit" onclick="openForm('${o.id}')">${SVG_EDIT}</span>
        <span class="ib mail" onclick="emailWO('${o.id}')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 6-10 7L2 6"/></svg></span>
        <span class="ib del" onclick="delOrder('${o.id}')">${SVG_DEL}</span>
      </div></td></tr>`;
    if(open)h+=progressRow(o,'setStage',13);
  });
  $('b').innerHTML=h||'<tr><td colspan="13" style="padding:30px;text-align:center;color:#9aa3af">No containers in this view.</td></tr>';
}
function progressRow(o,fn,cols){
  const stages=stagesFor(o),N=stages.length,prog=getProg(o);let pr='';
  prog.forEach((dn,i)=>{let s='';for(let k=1;k<=N;k++)s+=`<div class="st${k<=dn?' done':''}" onclick="${fn}('${o.id}',${i},${k})">${SHORT[stages[k-1]]||stages[k-1]}</div>`;
    pr+=`<div class="cprog"><div class="cn">#${i+1}</div><div class="stages">${s}</div><div class="pct">${Math.round(dn/N*100)}%</div></div>`;});
  return `<tr class="detail"><td colspan="${cols}"><div class="detail-in"><div class="dhead">Build progress — ${prog.length} container${prog.length>1?'s':''} · ${esc(o.sz)}</div>${pr}</div></td></tr>`;
}
function toggleExpand(id){expanded.has(id)?expanded.delete(id):expanded.add(id);renderOrders();}
function setField(id,f,v){const o=find(id);if(o){o[f]=v;renderOrders();markDirty(id);}}
function setQty(id,el){const o=find(id);if(!o)return;o.qty=clampQty(el.value);getProg(o);renderOrders();markDirty(id);}
function setStage(id,ci,stage){const o=find(id);if(!o)return;const a=getProg(o);a[ci]=(a[ci]===stage)?stage-1:stage;if(a[ci]<0)a[ci]=0;renderOrders();markDirty(id);}
function togglePrio(id){const o=find(id);if(o){o.prio=!o.prio;renderOrders();markDirty(id);}}
function delOrder(id){const o=find(id);if(!o)return;if(!confirm('Delete ticket '+(o.tid||id)+'?'))return;D=D.filter(x=>x.id!==id);expanded.delete(id);renderOrders();pushDelete('Orders',id);}
function emailWO(id){const o=find(id);if(!o)return;const tk=o.tid||o.id;
  const subj=`Container Work Order — ${o.loc||tk} (Ticket ${tk})`;
  const body=[`Ticket: ${tk}`,`Location: ${o.loc||''}`,o.addr?`Address: ${o.addr}`:'',o.ph?`Phone: ${o.ph}`:'',`Status: ${o.st}`,`Qty: ${o.qty}`,`Build: ${o.bd}`,`Container Size: ${o.sz}`,`Load Style: ${o.ld}`,`Lids: ${o.li}`,`Casters: ${o.ca}`,o.pl?`Order Placed: ${o.pl}`:'',o.du?`Projected Completion: ${o.du}`:'',o.no?`Notes: ${o.no}`:''].filter(Boolean).join('\n');
  window.location.href='mailto:'+CONFIG.EMAIL_TO+'?subject='+encodeURIComponent(subj)+'&body='+encodeURIComponent(body);}
let pop=null;
function openPop(e,id,field){e.stopPropagation();closePop();const map=field==='st'?STATUS:LOAD;pop=document.createElement('div');pop.className='pop';
  Object.keys(map).forEach(k=>{const b=document.createElement('button');b.innerHTML=`<span class="dot" style="background:${map[k].d}"></span>${k}`;b.onclick=()=>{const o=find(id);if(o)o[field]=k;closePop();renderOrders();markDirty(id);};pop.appendChild(b);});
  document.body.appendChild(pop);const r=e.currentTarget.getBoundingClientRect();pop.style.top=(r.bottom+5)+'px';pop.style.left=Math.min(r.left,innerWidth-pop.offsetWidth-12)+'px';}
function closePop(){if(pop){pop.remove();pop=null;}}
document.addEventListener('click',closePop);

/* ===== STOCK board (no work ticket) ===== */
function renderStock(){
  $('thr').innerHTML=STOCK_HEAD;
  const q=$('search').value.trim().toLowerCase();
  let list=S.slice();
  if(q)list=list.filter(o=>[o.loc,o.sz,o.bd,o.ca,o.no].join(' ').toLowerCase().includes(q));
  $('count').textContent=list.length+' stock';
  let h='',z=0;
  list.forEach(o=>{
    const open=expS.has(o.id),zc=(z++%2)?' zebra':'';
    h+=`<tr class="r${zc}" data-rowid="${o.id}">
      <td class="c-tkt"><div class="tktwrap"><span class="tkt${open?' open':''}" onclick="stExpand('${o.id}')"><span class="cv">${SVG_CARET}</span>Build</span></div></td>
      <td class="loc" data-label="Location"><div class="nm">${esc(o.loc)}</div></td>
      <td class="gdiv" data-label="Build"><select class="cell ${o.bd==='New Container'?'cnew':'creb'}" onchange="stSet('${o.id}','bd',this.value)">${opt(BUILDS,o.bd)}</select></td>
      <td data-label="Size"><select class="cell" onchange="stSet('${o.id}','sz',this.value)">${opt(CTYPES,o.sz)}</select></td>
      <td data-label="Load"><select class="cell" onchange="stSet('${o.id}','ld',this.value)">${opt(LOADS,o.ld)}</select></td>
      <td data-label="Lids"><select class="cell" onchange="stSet('${o.id}','li',this.value)">${opt(LIDS,o.li)}</select></td>
      <td data-label="Casters"><select class="cell wide" onchange="stSet('${o.id}','ca',this.value)">${opt(CASTERS,o.ca)}</select></td>
      <td class="gdiv" data-label="Qty"><input class="qty" type="number" min="1" max="10" value="${o.qty}" onchange="stQty('${o.id}',this)"></td>
      <td data-label="Notes"><div class="notes"><textarea onchange="stSet('${o.id}','no',this.value)" placeholder="Notes…">${esc(o.no)}</textarea></div></td>
      <td class="gdiv" data-label="QR"><span class="ib qr" onclick="openQR('${o.id}','stock')">${SVG_QR}</span></td>
      <td data-label="Actions"><div class="acts"><span class="ib edit" onclick="stForm('${o.id}')">${SVG_EDIT}</span><span class="ib del" onclick="stDel('${o.id}')">${SVG_DEL}</span></div></td>
    </tr>`;
    if(open)h+=progressRow(o,'stStage',11);
  });
  $('b').innerHTML=h||'<tr><td colspan="11" style="padding:30px;text-align:center;color:#9aa3af">No stock containers yet. Click <b>+ New Stock</b>.</td></tr>';
}
function stExpand(id){expS.has(id)?expS.delete(id):expS.add(id);renderStock();}
function stSet(id,f,v){const o=findS(id);if(o){o[f]=v;renderStock();markDirtyS(id);}}
function stQty(id,el){const o=findS(id);if(!o)return;o.qty=clampQty(el.value);getProg(o);renderStock();markDirtyS(id);}
function stStage(id,ci,stage){const o=findS(id);if(!o)return;const a=getProg(o);a[ci]=(a[ci]===stage)?stage-1:stage;if(a[ci]<0)a[ci]=0;renderStock();markDirtyS(id);}
function stDel(id){const o=findS(id);if(!o)return;if(!confirm('Delete this stock container?'))return;S=S.filter(x=>x.id!==id);expS.delete(id);renderStock();pushDelete('Stock',id);}
function fillStockSelects(){if(stockFilled)return;stockFilled=true;$('s_bd').innerHTML=opt(BUILDS);$('s_sz').innerHTML=opt(CTYPES);$('s_ld').innerHTML=opt(LOADS);$('s_li').innerHTML=opt(LIDS);$('s_ca').innerHTML=opt(CASTERS);}
function stForm(id){fillStockSelects();editIdS=id||null;$('stockTitle').textContent=id?'Edit Stock Container':'New Stock Container';
  const o=id?findS(id):null;
  $('s_loc').value=o?o.loc:'';$('s_qty').value=o?o.qty:1;$('s_bd').value=o?o.bd:'New Container';$('s_sz').value=o?o.sz:'2 Yard';$('s_ld').value=o?o.ld:'Front Load';$('s_li').value=o?o.li:'None';$('s_ca').value=o?o.ca:'None';$('s_no').value=o?o.no:'';
  $('stockModal').classList.add('open');}
function closeStockForm(){$('stockModal').classList.remove('open');}
function stSaveForm(){
  const loc=$('s_loc').value.trim();if(!loc){alert('Customer Location is required.');return;}
  const data={loc,qty:clampQty($('s_qty').value),bd:$('s_bd').value,sz:$('s_sz').value,ld:$('s_ld').value,li:$('s_li').value,ca:$('s_ca').value,no:$('s_no').value};
  let sid;
  if(editIdS){const o=findS(editIdS);if(o){Object.assign(o,data);getProg(o);}sid=editIdS;}
  else{const o=Object.assign({id:uid(),createdAt:new Date().toISOString(),sort:S.length,pr:[]},data);getProg(o);S.push(o);expS.add(o.id);sid=o.id;}
  closeStockForm();renderStock();markDirtyS(sid);}

/* ===== New / Edit ORDER form ===== */
function fillFormSelects(){if(formFilled)return;formFilled=true;$('f_st').innerHTML=opt(Object.keys(STATUS));$('f_bd').innerHTML=opt(BUILDS);$('f_sz').innerHTML=opt(CTYPES);$('f_ld').innerHTML=opt(LOADS);$('f_li').innerHTML=opt(LIDS);$('f_ca').innerHTML=opt(CASTERS);}
function openForm(id){fillFormSelects();editId=id||null;$('formTitle').textContent=id?'Edit Order':'New Order';
  const o=id?find(id):null;
  $('f_id').value=o?(o.tid||''):'';$('f_loc').value=o?o.loc:'';$('f_addr').value=o?(o.addr||''):'';$('f_ph').value=o?(o.ph||''):'';
  $('f_pl').value=o?(o.pl||''):'';$('f_du').value=o?(o.du||''):'';$('f_qty').value=o?o.qty:1;
  $('f_st').value=o?o.st:'New';$('f_bd').value=o?o.bd:'New Container';$('f_sz').value=o?o.sz:'2 Yard';
  $('f_ld').value=o?o.ld:'Front Load';$('f_li').value=o?o.li:'None';$('f_ca').value=o?o.ca:'None';
  $('f_prio').checked=o?!!o.prio:false;$('f_no').value=o?o.no:'';
  $('formModal').classList.add('open');}
function closeForm(){$('formModal').classList.remove('open');}
function saveForm(){
  const loc=$('f_loc').value.trim();if(!loc){alert('Location / Site is required.');return;}
  const data={tid:$('f_id').value.trim(),loc,addr:$('f_addr').value.trim(),ph:$('f_ph').value.trim(),st:$('f_st').value,pl:$('f_pl').value,du:$('f_du').value,qty:clampQty($('f_qty').value),bd:$('f_bd').value,sz:$('f_sz').value,ld:$('f_ld').value,li:$('f_li').value,ca:$('f_ca').value,prio:$('f_prio').checked,no:$('f_no').value};
  let oid;
  if(editId){const o=find(editId);if(o){Object.assign(o,data);getProg(o);}oid=editId;}
  else{const o=Object.assign({id:uid(),createdAt:new Date().toISOString(),sort:D.length,pr:[]},data);getProg(o);D.push(o);expanded.add(o.id);oid=o.id;}
  closeForm();renderOrders();markDirty(oid);}

/* ===== QR (orders + stock) ===== */
const qurl=(o,ci,kind)=>BASE+(kind==='stock'?'?stock='+encodeURIComponent(o.id):'?ticket='+encodeURIComponent(o.tid||o.id))+'&c='+ci;
const doneList=(d,stages)=>d<=0?'Not started':stages.slice(0,d).join(', ');
function openQR(id,kind){const o=kind==='stock'?findS(id):find(id);if(!o)return;qrId=id;qrKind=kind||'order';
  $('qrT').textContent=o.loc||o.tid||o.id;$('qrS').textContent=(kind==='stock'?'Stock · ':'')+o.sz;
  const stages=stagesFor(o),N=stages.length;
  const g=$('qrG');g.innerHTML='';getProg(o).forEach((dn,i)=>{
    const cell=document.createElement('div');cell.className='qrcell';const q=document.createElement('div');q.className='qr';
    new QRCode(q,{text:qurl(o,i+1,kind),width:140,height:140,correctLevel:QRCode.CorrectLevel.M});
    const pct=Math.round(dn/N*100);
    const cap=document.createElement('div');cap.className='qrcap';cap.innerHTML=`${esc(o.loc||o.tid||o.id)}<span class="qccont">Container #${i+1}</span><span class="sub"><b>${pct}% complete</b><span class="done">${dn<=0?'Not started':'Done: '+esc(doneList(dn,stages))}</span></span>`;
    const btn=document.createElement('button');btn.className='qrprint';btn.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/></svg>Print`;
    btn.onclick=()=>printLabel(o.id,i+1,kind);cell.append(q,cap,btn);g.appendChild(cell);});
  $('qrModal').classList.add('open');}
function closeQR(){$('qrModal').classList.remove('open');}
function mkLabel(o,ci,kind){const w=document.createElement('div');w.className='label';const qd=document.createElement('div');qd.className='lqr';
  new QRCode(qd,{text:qurl(o,ci,kind),width:130,height:130,correctLevel:QRCode.CorrectLevel.M});
  const t=document.createElement('div');t.className='lt';t.textContent=o.loc||o.tid||o.id;
  const c=document.createElement('div');c.className='lc';c.textContent='Container #'+ci;
  const s=document.createElement('div');s.className='ls';s.textContent=(kind==='stock'?'Stock':'Ticket '+(o.tid||o.id))+' • '+o.sz;w.append(qd,t,c,s);return w;}
function printLabel(id,ci,kind){const o=kind==='stock'?findS(id):find(id);const box=$('printLabels');box.innerHTML='';box.appendChild(mkLabel(o,ci,kind));setTimeout(()=>print(),200);}
function printTicket(){const o=qrKind==='stock'?findS(qrId):find(qrId);const box=$('printLabels');box.innerHTML='';for(let i=1;i<=clampQty(o.qty);i++)box.appendChild(mkLabel(o,i,qrKind));setTimeout(()=>print(),300);}
function printAll(){const arr=view==='stock'?S:D,kind=view==='stock'?'stock':'order';const box=$('printLabels');box.innerHTML='';arr.forEach(o=>{for(let i=1;i<=clampQty(o.qty);i++)box.appendChild(mkLabel(o,i,kind));});setTimeout(()=>print(),350);}

/* ===== sticky header height ===== */
function syncHeaderH(){const h=document.getElementById('appHeader');if(h)document.documentElement.style.setProperty('--hh',h.offsetHeight+'px');}
window.addEventListener('resize',syncHeaderH);window.addEventListener('load',syncHeaderH);setTimeout(syncHeaderH,300);

/* ===== Google Sheet sync — per-row upsert / delete ===== */
function setSync(s){const el=$('sync');if(!el)return;
  if(!CONFIG.API_URL){el.textContent='● local only';el.style.color='#67707c';return;}
  const m={ok:['● synced','#16a34a'],saving:['● saving…','#b45309'],loading:['● loading…','#b45309'],offline:['● offline','#dc2626']};
  const v=m[s]||m.ok;el.textContent=v[0];el.style.color=v[1];}
function parseProg(v){if(Array.isArray(v))return v.map(x=>x|0);if(v==null||v==='')return [];try{const a=JSON.parse(v);return Array.isArray(a)?a.map(x=>x|0):[];}catch(e){return [];}}
function truthy(v){return v===true||v===1||v==='1'||String(v).toUpperCase()==='TRUE';}
function orderFromRow(r){return{id:r.id||uid(),tid:String(r.ticketId==null?'':r.ticketId),st:r.status||'New',loc:r.siteName||'',addr:r.address||'',ph:r.phone==null?'':String(r.phone),bd:r.category||'New Container',ld:r.loadType||'Front Load',sz:r.containerType||'2 Yard',li:r.lids||'None',no:r.notes==null?'':String(r.notes),qty:clampQty(r.qty||1),ca:r.casters||'None',prio:truthy(r.priority),sort:(r.sort===''||r.sort==null)?0:(Number(r.sort)||0),pr:parseProg(r.progress),pl:dateStr(r.orderPlaced),du:dateStr(r.projectedDone),createdAt:r.createdAt||''};}
function rowFromOrder(o){return{id:o.id,ticketId:o.tid||'',status:o.st||'New',siteName:o.loc||'',address:o.addr||'',phone:o.ph||'',category:o.bd||'New Container',loadType:o.ld||'Front Load',containerType:o.sz||'2 Yard',lids:o.li||'None',notes:o.no||'',createdAt:o.createdAt||'',updatedAt:'',qty:o.qty||1,casters:o.ca||'None',priority:o.prio?1:'',sort:(o.sort!=null?o.sort:0),progress:JSON.stringify(o.pr||[]),orderPlaced:o.pl||'',projectedDone:o.du||''};}
function stockFromRow(r){return{id:r.id||uid(),loc:r.loc||'',bd:r.category||'New Container',sz:r.containerType||'2 Yard',ld:r.loadType||'Front Load',li:r.lids||'None',ca:r.casters||'None',qty:clampQty(r.qty||1),no:r.notes==null?'':String(r.notes),sort:(r.sort===''||r.sort==null)?0:(Number(r.sort)||0),pr:parseProg(r.progress),createdAt:r.createdAt||''};}
function rowFromStock(o){return{id:o.id,loc:o.loc||'',category:o.bd||'New Container',containerType:o.sz||'2 Yard',loadType:o.ld||'Front Load',lids:o.li||'None',casters:o.ca||'None',qty:o.qty||1,notes:o.no||'',sort:(o.sort!=null?o.sort:0),progress:JSON.stringify(o.pr||[]),createdAt:o.createdAt||'',updatedAt:''};}
function jsonp(url){return new Promise((res,rej)=>{
  const cb='__wrs_cb_'+Math.random().toString(36).slice(2);let done=false;const s=document.createElement('script');
  window[cb]=d=>{done=true;cleanup();res(d);};
  function cleanup(){try{delete window[cb];}catch(e){window[cb]=undefined;}if(s.parentNode)s.remove();}
  s.onerror=()=>{if(!done){cleanup();rej(new Error('jsonp error'));}};
  s.src=url+(url.indexOf('?')>=0?'&':'?')+'callback='+cb+'&_t='+Date.now();
  document.body.appendChild(s);
  setTimeout(()=>{if(!done){cleanup();rej(new Error('timeout'));}},14000);});}
function postAction(payload){return fetch(CONFIG.API_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)});}
const dirty=new Set(),dirtyS=new Set();let flushTimer=null,flushTimerS=null;
function markDirty(id){if(!CONFIG.API_URL)return;dirty.add(id);setSync('saving');clearTimeout(flushTimer);flushTimer=setTimeout(flushDirty,700);}
function flushDirty(){const ids=[...dirty];dirty.clear();if(!ids.length)return;ids.forEach(id=>{const o=find(id);if(o)postAction({action:'upsert',tab:'Orders',order:rowFromOrder(o)});});setSync('ok');}
function markDirtyS(id){if(!CONFIG.API_URL)return;dirtyS.add(id);setSync('saving');clearTimeout(flushTimerS);flushTimerS=setTimeout(flushDirtyS,700);}
function flushDirtyS(){const ids=[...dirtyS];dirtyS.clear();if(!ids.length)return;ids.forEach(id=>{const o=findS(id);if(o)postAction({action:'upsert',tab:'Stock',order:rowFromStock(o)});});setSync('ok');}
function pushDelete(tab,id){if(!CONFIG.API_URL)return;setSync('saving');postAction({action:'delete',tab,id}).then(()=>setSync('ok')).catch(()=>setSync('offline'));}
function isEditingNow(){if($('formModal').classList.contains('open')||$('stockModal').classList.contains('open')||$('qrModal').classList.contains('open'))return true;const ae=document.activeElement;return !!ae&&['TEXTAREA','SELECT','INPUT'].includes(ae.tagName);}
function loadRemote(force){
  if(!CONFIG.API_URL){setSync();renderView();return Promise.resolve();}
  if(!force&&(isEditingNow()||dirty.size))return Promise.resolve();
  setSync('loading');
  return jsonp(CONFIG.API_URL+'?tab=Orders').then(d=>{
    if(d&&d.ok&&Array.isArray(d.orders)){D=d.orders.map(orderFromRow).sort((a,b)=>a.sort-b.sort);if(view==='orders')renderOrders();setSync('ok');}
    else setSync('offline');
  }).catch(()=>setSync('offline'));}
function loadStock(force){
  if(!CONFIG.API_URL)return Promise.resolve();
  if(!force&&(isEditingNow()||dirtyS.size))return Promise.resolve();
  return jsonp(CONFIG.API_URL+'?tab=Stock').then(d=>{
    if(d&&d.ok&&Array.isArray(d.orders)){S=d.orders.map(stockFromRow).sort((a,b)=>a.sort-b.sort);if(view==='stock')renderStock();}
  }).catch(()=>{});}

/* ===== deep link (QR scan) ===== */
function handleDeepLink(){
  const p=new URLSearchParams(location.search);const tk=p.get('ticket'),sk=p.get('stock');
  if(sk){const o=findS(sk);if(o){view='stock';expS.add(sk);renderView();flashRow(sk);}return;}
  if(tk){const o=D.find(x=>String(x.tid).toLowerCase()===tk.toLowerCase());if(o){view='orders';expanded.add(o.id);renderView();flashRow(o.id);}}}
function flashRow(id){setTimeout(()=>{const row=document.querySelector('[data-rowid="'+id+'"]');if(row){row.classList.add('flash');row.scrollIntoView({behavior:'smooth',block:'center'});}},150);}

/* ===== init ===== */
syncHeaderH();setSync('loading');renderView();
Promise.all([loadRemote(true),loadStock(true)]).then(()=>{if(!deepDone){deepDone=true;handleDeepLink();}});
setInterval(()=>{loadRemote(false);loadStock(false);},30000);
</script>
